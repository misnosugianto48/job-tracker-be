name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: job_tracker_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Generate Prisma client
      run: npx prisma generate

    - name: Run Prisma migrations on test db
      run: npx prisma db push
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/job_tracker_test?schema=public"

    - name: Run Tests
      run: npm run test
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/job_tracker_test?schema=public"

    - name: Build TypeScript code
      run: npm run build

    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

    - name: Deploy Backend to Biznet GIO VPS
      run: |
        # Create target directory on VPS
        ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "mkdir -p ${{ secrets.VPS_TARGET_DIR }}/backend"
        
        # Sync compiled files
        rsync -avz -e "ssh -i ~/.ssh/id_ed25519" --delete dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:${{ secrets.VPS_TARGET_DIR }}/backend/dist/
        rsync -avz -e "ssh -i ~/.ssh/id_ed25519" --delete prisma/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:${{ secrets.VPS_TARGET_DIR }}/backend/prisma/
        rsync -avz -e "ssh -i ~/.ssh/id_ed25519" package.json package-lock.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:${{ secrets.VPS_TARGET_DIR }}/backend/

    - name: Restart PM2 Application
      run: |
        ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
          cd ${{ secrets.VPS_TARGET_DIR }}/backend &&
          npm install --production &&
          npx prisma generate &&
          pm2 restart job-tracker-api || pm2 start dist/server.js --name 'job-tracker-api'
        "
