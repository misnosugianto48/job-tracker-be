services:
  db:
    image: postgres:15-alpine
    container_name: job_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-job_tracker}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job_tracker_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT:-5000}
      NODE_ENV: production
    ports:
      - "127.0.0.1:${PORT:-5000}:5000"
    command: sh -c "export DATABASE_URL=${DATABASE_URL} && npx prisma migrate deploy && npm run start"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_network

  portainer:
    image: portainer/portainer-ce:latest
    container_name: job_tracker_portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - backend_network

volumes:
  db_data:
  portainer_data:

networks:
  backend_network:
    driver: bridge
