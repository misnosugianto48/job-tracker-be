name: Backend CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: job_tracker_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - run: npx prisma generate

      - name: Run Prisma migrations on test db
        run: npx prisma db push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/job_tracker_test?schema=public

      - run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/job_tracker_test?schema=public

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -avz \
            -e "ssh -p ${{ secrets.VPS_PORT }}" \
            --delete \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude '.git' \
            --exclude '.env' \
            --exclude 'job_tracker_deploy_key' \
            --exclude '*.pub' \
            ./ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:${{ secrets.VPS_TARGET_DIR }}/backend/

      - name: Deploy containers on VPS
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
            cd ${{ secrets.VPS_TARGET_DIR }}/backend &&
            docker compose up --build -d &&
            docker compose exec -T backend npx prisma migrate deploy
          "
