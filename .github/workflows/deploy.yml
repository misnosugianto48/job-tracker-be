name: Backend CI/CD Pipeline (Docker)

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: job_tracker_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Generate Prisma client
      run: npx prisma generate

    - name: Run Prisma migrations on test db
      run: npx prisma db push
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/job_tracker_test?schema=public"

    - name: Run Tests
      run: npm run test
      env:
        DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/job_tracker_test?schema=public"

    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

    - name: Transfer Backend Files to VPS
      run: |
        # Create target directory on VPS
        ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "mkdir -p ${{ secrets.VPS_TARGET_DIR }}/backend"
        
        # Sync backend files (exclude local dev dependencies / builds)
        rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" --delete --exclude 'node_modules' --exclude 'dist' ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:${{ secrets.VPS_TARGET_DIR }}/backend/
        
        # Copy docker-compose.yml to the root directory
        rsync -avz -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }}" docker-compose.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:${{ secrets.VPS_TARGET_DIR }}/

    - name: Build and Start Backend Containers on VPS
      run: |
        ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
          cd ${{ secrets.VPS_TARGET_DIR }} &&
          docker compose up --build -d db backend portainer &&
          docker compose exec -T backend npx prisma migrate deploy
        "
